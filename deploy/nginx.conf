# Nginx configuration for LORA
# Place at: /etc/nginx/sites-available/lora
# Symlink: ln -s /etc/nginx/sites-available/lora /etc/nginx/sites-enabled/lora

upstream lora_app {
    server unix:/run/lora/gunicorn.sock fail_timeout=0;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size — evidence images
    client_max_body_size 10M;

    # Static files — served directly by Nginx
    location /static/ {
        alias /opt/lora/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — evidence uploads
    location /media/ {
        alias /opt/lora/media/;
        expires 7d;
    }

    # Application
    location / {
        proxy_pass http://lora_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts for slow operations (PDF generation, screenshots)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
