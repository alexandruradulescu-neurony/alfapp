<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="tabs">
    <button id="tab-briefing" class="tab active" data-tab="briefing">Briefing</button>
    <button id="tab-chat" class="tab" data-tab="chat">Chat</button>
  </div>

  <section id="panel-briefing" class="panel">
    <div id="briefing-loading">
      <div class="skel" style="width: 92%"></div>
      <div class="skel" style="width: 74%"></div>
      <div class="skel" style="width: 84%"></div>
    </div>
    <div id="briefing-content" hidden>
      <div id="summary" class="summary"></div>
      <div id="next-steps"></div>
      <div id="facts" class="facts"></div>
      <div id="attention"></div>
      <div class="actions">
        <button id="btn-regen" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          Regenerate
        </button>
        <button id="btn-next-steps" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
          Next steps
        </button>
        <button id="btn-draft-client" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
          Client update
        </button>
        <button id="btn-draft-inst" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22h18"/><path d="M6 18v-7M10 18v-7M14 18v-7M18 18v-7"/><path d="M3 11l9-7 9 7z"/></svg>
          Institution reply
        </button>
        <button id="btn-flight" type="button" class="wide" title="Look up the flight and cross-check it against the claim">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
          Find flight info
        </button>
      </div>
      <div id="flight-result" hidden></div>
      <div id="draft-status"></div>
    </div>
    <div id="briefing-error" class="error" hidden>
      Couldn't load the briefing. <button id="briefing-retry">Retry</button>
      <div id="briefing-error-detail" class="muted"></div>
    </div>
  </section>

  <section id="panel-chat" class="panel" hidden>
    <div id="chat-log">
      <div id="chat-empty">
        <p class="muted">Ask LORA anything about this ticket.</p>
        <div class="chips">
          <button type="button" class="chip" data-q="Summarize this ticket">Summarize</button>
          <button type="button" class="chip" data-q="When was this ticket submitted?">When submitted?</button>
          <button type="button" class="chip" data-q="Translate the last email into English">Translate last email</button>
          <button type="button" class="chip" data-q="What is the agent expected to do next on this ticket?">What's next?</button>
        </div>
      </div>
    </div>
    <div id="typing" hidden>LORA is thinking<span class="dots"></span></div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="Ask about this ticket…" autocomplete="off">
      <button type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
      </button>
    </form>
  </section>

  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
