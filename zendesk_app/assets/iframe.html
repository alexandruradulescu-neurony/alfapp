<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="tabs">
    <button id="tab-briefing" class="tab active" data-tab="briefing">Briefing</button>
    <button id="tab-chat" class="tab" data-tab="chat">Chat</button>
  </div>

  <section id="panel-briefing" class="panel">
    <div id="briefing-loading">
      <div class="skel" style="width: 92%"></div>
      <div class="skel" style="width: 74%"></div>
      <div class="skel" style="width: 84%"></div>
    </div>
    <div id="briefing-content" hidden>
      <div id="summary" class="summary"></div>
      <div id="next-steps"></div>
      <div id="facts" class="facts"></div>
      <div class="actions">
        <button id="btn-regen" type="button">↻ Regenerate</button>
        <button id="btn-next-steps" type="button">Suggest next steps</button>
      </div>
    </div>
    <div id="briefing-error" class="error" hidden>
      Couldn't load the briefing. <button id="briefing-retry">Retry</button>
      <div id="briefing-error-detail" class="muted"></div>
    </div>
  </section>

  <section id="panel-chat" class="panel" hidden>
    <div id="chat-log"></div>
    <div id="typing" hidden>LORA is thinking<span class="dots"></span></div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="Ask about this claim…" autocomplete="off">
      <button type="submit">→</button>
    </form>
  </section>

  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
