# LORA — Continuous Integration.
#
# Runs the pytest suite on every push to main and every PR. If you wire
# Railway to wait for GitHub status checks (project settings → deploy
# triggers), red CI blocks deploys.
#
# Free for public repos. Private repos: 2000 free minutes/month, plenty
# for this project. Each run takes ~3-5 minutes.

name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python 3.13 + Postgres 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
          SECRET_KEY: ci-only-not-used-anywhere
          ENCRYPTION_KEY: ci-only-encryption-key-32-bytes-aaaaaa
          PII_TOKENIZATION_SALT: ci-only-tokenization-salt
          DEBUG: 'False'
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py migrate --noinput

      - name: Run pytest
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
          SECRET_KEY: ci-only-not-used-anywhere
          ENCRYPTION_KEY: ci-only-encryption-key-32-bytes-aaaaaa
          PII_TOKENIZATION_SALT: ci-only-tokenization-salt
          DEBUG: 'False'
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: pytest -v --tb=short
