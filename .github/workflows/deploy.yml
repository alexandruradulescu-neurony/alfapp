# Deploy-readiness checks (migration drift + `manage.py check --deploy`).
#
# The pytest suite runs in `tests.yml`. Production deploys via Railway's
# GitHub integration (auto-deploy from `main`) — there is no deploy step here.
# A previous `deploy` job SSHed to a server using SSH_HOST/SSH_USER/SSH_KEY
# secrets that were never configured, so it failed on every push and made main
# CI permanently red; it was removed. If a non-Railway deploy is ever set up,
# re-add a job guarded on those secrets being present.

name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run checks
    runs-on: ubuntu-22.04

    env:
      SECRET_KEY: test-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost
      ENCRYPTION_KEY: test-encryption-key-not-for-production
      DATABASE_URL: sqlite:///db.sqlite3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check --deploy
