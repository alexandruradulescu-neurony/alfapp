[pytest]
# Django settings
DJANGO_SETTINGS_MODULE = lora_app.settings

# Python path
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths =
    apps
    lora_app

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require external services)
    django_db: marks tests as requiring database access
    unit: marks tests as unit tests (no database required)

# Output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Coverage configuration (when running with pytest-cov)
# addopts = --cov=apps --cov-report=html --cov-report=term-missing

# Timeout for individual tests (in seconds)
timeout = 60

# Log configuration
log_cli = false
log_cli_level = INFO

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
