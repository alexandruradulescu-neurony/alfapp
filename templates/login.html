{% extends 'base_auth.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-sm">
                <i class="bi bi-box-seam text-2xl text-white"></i>
            </div>
            <h2 class="mt-6 text-3xl font-bold text-white">LORA</h2>
            <p class="mt-2 text-sm text-white/80">Lost Object Recovery Automation</p>
        </div>
        
        <div class="bg-white py-8 px-6 shadow-lg rounded-xl sm:px-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
                        <div class="mt-1 relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="bi bi-person text-slate-400"></i>
                            </div>
                            <input type="text" id="username" name="username" required
                                   class="input-field pl-10"
                                   placeholder="Enter your username" autofocus>
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                        <div class="mt-1 relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="bi bi-lock text-slate-400"></i>
                            </div>
                            <input type="password" id="password" name="password" required
                                   class="input-field pl-10"
                                   placeholder="Enter your password">
                        </div>
                    </div>
                </div>
                
                {% if messages %}
                    {% for message in messages %}
                    <div class="rounded-md bg-red-50 p-4 flex items-start">
                        <div class="flex-shrink-0">
                            <i class="bi bi-exclamation-triangle text-red-400"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-red-700">{{ message }}</p>
                        </div>
                    </div>
                    {% endfor %}
                {% endif %}
                
                <div>
                    <button type="submit"
                            class="w-full btn-primary flex justify-center items-center">
                        <i class="bi bi-box-arrow-in-right mr-2"></i>
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
