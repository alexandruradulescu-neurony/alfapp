{% extends 'base_auth.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="text-center max-w-md animate-fade-in">
        <!-- Error Icon -->
        <div class="mx-auto h-28 w-28 bg-primary/10 rounded-full flex items-center justify-center mb-8">
            <i class="bi bi-compass text-5xl text-primary"></i>
        </div>

        <!-- Error Message -->
        <p class="text-6xl font-bold text-base-content/10 mb-2">404</p>
        <h1 class="text-2xl font-semibold tracking-tight text-base-content mb-3">Page not found</h1>
        <p class="text-base-content/60 mb-10 leading-relaxed">
            The page you're looking for doesn't exist or has been moved to a new location.
        </p>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-primary rounded-xl transition-all duration-200 hover:scale-[1.02]">
                    <i class="bi bi-house mr-1"></i> Go to Dashboard
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary rounded-xl transition-all duration-200 hover:scale-[1.02]">
                    <i class="bi bi-box-arrow-in-right mr-1"></i> Go to Login
                </a>
            {% endif %}
            <button onclick="history.back()" class="btn btn-ghost rounded-xl transition-all duration-200 hover:scale-[1.02]">
                <i class="bi bi-arrow-left mr-1"></i> Go back
            </button>
        </div>
    </div>
</div>
{% endblock %}
